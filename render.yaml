services:
  - type: web
    name: jogo-bonito-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_DATA_BASE
        value: https://api.football-data.org/v4

  - type: cron
    name: jogo-bonito-puzzle-cron
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    schedule: "0 0 * * *"
    startCommand: node -e "require('./dist/jobs/dailyPuzzleJob').runDailyPuzzleJob().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_DATA_BASE
        value: https://api.football-data.org/v4
